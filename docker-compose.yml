services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Phase 2 — Hybrid Retrieval & Tables
      # Override any of these in .env or as Docker env vars:
      # COHERE_API_KEY=<your-cohere-key>          # enables Cohere Rerank (rerank-english-v3.0)
      # HYBRID_RETRIEVAL_ENABLED=true             # dense + sparse + table hybrid search (default: true)
      # QDRANT_TABLES_COLLECTION=rag_tables       # Qdrant collection for table chunks (default: rag_tables)
      # QUERY_CACHE_TTL=3600                      # Redis query cache TTL in seconds (default: 3600)
      HYBRID_RETRIEVAL_ENABLED: ${HYBRID_RETRIEVAL_ENABLED:-true}
      QDRANT_TABLES_COLLECTION: ${QDRANT_TABLES_COLLECTION:-rag_tables}
      QUERY_CACHE_TTL: ${QUERY_CACHE_TTL:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./data:/app/data

  worker:
    build: .
    command: celery -A src.core.ingestion.tasks worker --loglevel=info
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_search
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_search"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
