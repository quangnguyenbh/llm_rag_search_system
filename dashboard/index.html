<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManualAI — Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header .badge {
      background: var(--accent);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .header .status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .header .status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 3px;
      border-radius: 8px;
      margin-left: 24px;
    }
    .mode-toggle button {
      padding: 4px 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
    }
    .mode-toggle button.active {
      background: var(--accent);
      color: white;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Chat panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 80%;
      line-height: 1.6;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      border-radius: 16px 16px 4px 16px;
      font-size: 14px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface);
      padding: 16px 20px;
      border-radius: 4px 16px 16px 16px;
      font-size: 14px;
      border: 1px solid var(--border);
    }
    .msg.assistant .sources {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .msg.assistant .sources h4 {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .msg.assistant .sources .source-item {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0;
    }
    .msg.assistant .sources .source-item .score {
      color: var(--accent);
      font-weight: 500;
    }
    .msg.assistant .meta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .msg.system {
      align-self: center;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      align-self: flex-start;
    }
    .typing span {
      width: 8px; height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }
    .input-area textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .input-area textarea::placeholder {
      color: var(--text-muted);
    }
    .input-area button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .input-area button:hover {
      background: var(--accent-hover);
    }
    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Sources sidebar */
    .sidebar {
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: none;
    }
    .sidebar.open { display: block; }
    .sidebar h3 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sidebar .chunk {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .sidebar .chunk .chunk-header {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 4px;
      font-size: 12px;
    }
    .sidebar .chunk .chunk-text {
      color: var(--text-muted);
    }
    .sidebar .chunk .chunk-score {
      font-size: 11px;
      color: var(--green);
      margin-top: 4px;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      margin: auto;
      color: var(--text-muted);
      max-width: 500px;
    }
    .welcome h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome p { font-size: 14px; margin-bottom: 16px; }
    .welcome .examples {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .welcome .examples button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }
    .welcome .examples button:hover {
      border-color: var(--accent);
    }

    /* Search results mode */
    .search-results {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: none;
    }
    .search-results.active { display: block; }
    .search-result-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .search-result-item .sr-title {
      font-weight: 600;
      color: var(--accent);
      font-size: 14px;
    }
    .search-result-item .sr-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .search-result-item .sr-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      display: flex;
      gap: 12px;
    }
    .search-result-item .sr-meta .score { color: var(--green); }
  </style>
</head>
<body>
  <div class="header">
    <h1>ManualAI</h1>
    <span class="badge">RAG</span>
    <div class="mode-toggle">
      <button class="active" onclick="setMode('chat')">Chat</button>
      <button onclick="setMode('search')">Search</button>
    </div>
    <div class="status">
      <div class="dot"></div>
      <span>Connected</span>
    </div>
  </div>

  <div class="main">
    <div class="chat-panel">
      <!-- Chat messages -->
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <h2>Ask anything about your manuals</h2>
          <p>AI-powered answers grounded in your indexed PDF documents with source citations.</p>
          <div class="examples">
            <button onclick="askExample(this.textContent)">What safety precautions should I follow?</button>
            <button onclick="askExample(this.textContent)">How do I perform maintenance on the system?</button>
            <button onclick="askExample(this.textContent)">What are the technical specifications?</button>
          </div>
        </div>
      </div>

      <!-- Search results view -->
      <div class="search-results" id="searchResults"></div>

      <!-- Input -->
      <div class="input-area">
        <textarea id="input" rows="1" placeholder="Ask a question about your manuals..."
                  onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
        <button id="sendBtn" onclick="send()">Send</button>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <h3>Retrieved Sources</h3>
      <div id="sidebarContent"></div>
    </div>
  </div>

  <script>
    const API_BASE = (location.protocol === 'file:')
      ? 'http://localhost:8000/v1/query'
      : '/v1/query';
    let mode = 'chat'; // 'chat' or 'search'
    let isStreaming = false;

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.mode-toggle button').forEach(b => {
        if (b.textContent.toLowerCase() === m) b.classList.add('active');
      });
      document.getElementById('messages').style.display = m === 'chat' ? 'flex' : 'none';
      document.getElementById('searchResults').style.display = m === 'search' ? 'block' : 'none';
      document.getElementById('input').placeholder = m === 'chat'
        ? 'Ask a question about your manuals...'
        : 'Search for document chunks...';
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function askExample(text) {
      document.getElementById('input').value = text;
      send();
    }

    function addMessage(role, content, meta) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';

      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      if (role === 'assistant' && meta) {
        let html = `<div class="answer">${formatMarkdown(content)}</div>`;
        if (meta.citations && meta.citations.length > 0) {
          html += `<div class="sources"><h4>Sources</h4>`;
          meta.citations.forEach(c => {
            html += `<div class="source-item">[Source ${c.source_index}] ${c.title || c.document_id}${c.page_number ? ' — Page ' + c.page_number : ''} <span class="score">(${(c.score * 100).toFixed(1)}%)</span></div>`;
          });
          html += `</div>`;
        }
        html += `<div class="meta">Model: ${meta.model_used || 'unknown'} · Confidence: ${((meta.confidence || 0) * 100).toFixed(0)}%</div>`;
        div.innerHTML = html;
      } else {
        div.textContent = content;
      }

      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function addTyping() {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function formatMarkdown(text) {
      // Simple markdown: bold, code, newlines
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.*?)`/g, '<code style="background:#334155;padding:1px 4px;border-radius:3px">$1</code>')
        .replace(/\n/g, '<br>');
    }

    async function send() {
      const input = document.getElementById('input');
      const question = input.value.trim();
      if (!question || isStreaming) return;

      input.value = '';
      input.style.height = 'auto';

      if (mode === 'search') {
        await doSearch(question);
      } else {
        await doChat(question);
      }
    }

    async function doChat(question) {
      addMessage('user', question);
      addTyping();
      isStreaming = true;
      document.getElementById('sendBtn').disabled = true;

      try {
        const resp = await fetch(`${API_BASE}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });

        if (!resp.ok) {
          const err = await resp.text();
          throw new Error(err);
        }

        const data = await resp.json();
        removeTyping();
        addMessage('assistant', data.answer, {
          citations: data.citations,
          confidence: data.confidence,
          model_used: data.model_used,
        });

        // Show sources in sidebar
        if (data.citations.length > 0) {
          showSidebar(data.citations);
        }
      } catch (err) {
        removeTyping();
        addMessage('system', `Error: ${err.message}`);
      } finally {
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
      }
    }

    async function doSearch(question) {
      const container = document.getElementById('searchResults');
      container.innerHTML = '<div style="color: var(--text-muted); padding: 20px;">Searching...</div>';

      try {
        const resp = await fetch(`${API_BASE}/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, top_k: 10 }),
        });

        if (!resp.ok) throw new Error(await resp.text());

        const data = await resp.json();
        container.innerHTML = '';

        if (data.results.length === 0) {
          container.innerHTML = '<div style="color: var(--text-muted); padding: 20px;">No results found.</div>';
          return;
        }

        data.results.forEach(r => {
          const div = document.createElement('div');
          div.className = 'search-result-item';
          div.innerHTML = `
            <div class="sr-title">${r.metadata?.title || r.document_id}</div>
            <div class="sr-text">${r.text.substring(0, 300)}${r.text.length > 300 ? '...' : ''}</div>
            <div class="sr-meta">
              <span class="score">Score: ${(r.score * 100).toFixed(1)}%</span>
              <span>Doc: ${r.document_id.substring(0, 12)}...</span>
              ${r.metadata?.page_number ? `<span>Page ${r.metadata.page_number}</span>` : ''}
            </div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        container.innerHTML = `<div style="color: red; padding: 20px;">Error: ${err.message}</div>`;
      }
    }

    function showSidebar(citations) {
      const sidebar = document.getElementById('sidebar');
      const content = document.getElementById('sidebarContent');
      sidebar.classList.add('open');

      content.innerHTML = '';
      citations.forEach(c => {
        const div = document.createElement('div');
        div.className = 'chunk';
        div.innerHTML = `
          <div class="chunk-header">[Source ${c.source_index}] ${c.title || c.document_id}</div>
          <div class="chunk-text">${c.text_preview || ''}</div>
          <div class="chunk-score">Score: ${(c.score * 100).toFixed(1)}%${c.page_number ? ' · Page ' + c.page_number : ''}</div>
        `;
        content.appendChild(div);
      });
    }
  </script>
</body>
</html>
